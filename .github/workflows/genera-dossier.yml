name: Genera Dossier

on:
  schedule:
    - cron: '27 7 * * *'   # 09:30 ora italiana — mezz'ora dopo Il Corrispondente
  workflow_dispatch:

jobs:
  genera:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install anthropic

      - name: Genera dossier
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python genera.py

      - name: Commit e push
        run: |
          git config user.name "Il Complottista Bot"
          git config user.email "bot@il-complottista"
          git add docs/posts.json docs/feed.xml
          git diff --staged --quiet || git commit -m "Dossier del $(date +'%Y-%m-%d')"
          git push
